<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AU Cloud Direct Price Comparison</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 24px;
      max-width: 1200px;
      margin: 0 auto;
      color: #333;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 16px;
    }
    #processBtn {
      padding: 8px 20px;
      font-size: 1rem;
      cursor: pointer;
      background: #0070b8;
      color: white;
      border: none;
      border-radius: 4px;
    }
    #processBtn:disabled {
      background: #aaa;
      cursor: default;
    }
    #status {
      margin: 12px 0;
      font-size: 0.95rem;
      min-height: 20px;
    }
    #status.error {
      color: #c00;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 16px;
      font-size: 0.9rem;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 7px 12px;
      text-align: left;
    }
    th {
      background: #f0f0f0;
      font-weight: 600;
    }
    tr:nth-child(even) td {
      background: #f9f9f9;
    }
    #resultsTable { display: none; }
    #charts { margin-top: 32px; }
    .chart-wrap { margin-bottom: 40px; }
    .chart-wrap h2 { font-size: 1rem; margin-bottom: 8px; }
  </style>
</head>
<body>
  <h1 id="pageTitle">AU Cloud Direct Price Comparison</h1>
  <button id="processBtn">Process Files</button>
  <div id="status"></div>

  <table id="resultsTable">
    <thead>
      <tr>
        <th>Material</th>
        <th>Price List Item</th>
        <th>In Blocks Of</th>
        <th>Metrics</th>
        <th>Price per Unit</th>
        <th>Source File</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <div id="charts"></div>

  <script>
    const btn = document.getElementById('processBtn');
    const status = document.getElementById('status');
    const table = document.getElementById('resultsTable');
    const tbody = document.getElementById('tableBody');
    const charts = document.getElementById('charts');
    const pageTitle = document.getElementById('pageTitle');

    const chartInstances = [];

    function renderCharts(results) {
      // Destroy previous charts
      chartInstances.forEach(c => c.destroy());
      chartInstances.length = 0;
      charts.innerHTML = '';

      // Group by material
      const byMaterial = {};
      const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      for (const r of results) {
        const price = parseFloat(r.pricePerUnit);
        if (isNaN(price)) continue;
        const m = r.material;
        const dateMatch = r.sourceFile.match(/(\d{4})(\d{2})(\d{2})/);
        if (!dateMatch) continue;
        const label = `${MONTHS[parseInt(dateMatch[2], 10) - 1]} ${dateMatch[1]}`;
        const sortKey = `${dateMatch[1]}${dateMatch[2]}`;
        if (!byMaterial[m]) byMaterial[m] = { label: r.priceListItem || m, points: [] };
        byMaterial[m].points.push({ label, sortKey, price });
      }

      for (const [material, { label, points }] of Object.entries(byMaterial)) {
        // Sort by date
        points.sort((a, b) => a.sortKey.localeCompare(b.sortKey));

        const wrap = document.createElement('div');
        wrap.className = 'chart-wrap';
        wrap.innerHTML = `<h2>${material} — ${label}</h2><canvas></canvas>`;
        charts.appendChild(wrap);

        const chart = new Chart(wrap.querySelector('canvas'), {
          type: 'bar',
          data: {
            labels: points.map(p => p.label),
            datasets: [{
              label: 'Price per Unit (AUD)',
              data: points.map(p => p.price),
              backgroundColor: '#0070b8cc',
              borderColor: '#0070b8',
              borderWidth: 1
            }]
          },
          options: {
            indexAxis: 'y',
            plugins: { legend: { display: false } },
            scales: {
              x: { title: { display: true, text: 'Price (AUD)' }, beginAtZero: false },
              y: { title: { display: true, text: 'Month / Year' } }
            }
          }
        });
        chartInstances.push(chart);
      }
    }

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      status.className = '';
      status.textContent = 'Processing... scanning Excel files, this may take 30–60 seconds.';
      tbody.innerHTML = '';
      table.style.display = 'none';
      charts.innerHTML = '';

      try {
        const resp = await fetch('/api/process');
        const data = await resp.json();

        if (!data.success) {
          throw new Error(data.error || 'Unknown error');
        }

        for (const r of data.results) {
          const tr = document.createElement('tr');
          [r.material, r.priceListItem, r.inBlocksOf, r.metrics, r.pricePerUnit, r.sourceFile].forEach(val => {
            const td = document.createElement('td');
            td.textContent = val;
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        }

        table.style.display = data.results.length ? 'table' : 'none';
        status.textContent = `Done. Found ${data.count} result(s). Written to C:\\Pricelists\\cloud\\results.txt`;
        if (data.minYear && data.maxYear) {
          const range = data.minYear === data.maxYear ? data.minYear : `${data.minYear}–${data.maxYear}`;
          pageTitle.textContent = `AU Cloud Direct Price Comparison (${range})`;
        }
        renderCharts(data.results);
      } catch (err) {
        status.className = 'error';
        status.textContent = 'Error: ' + err.message;
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
